spring.application.name=banking-api

# ==========================================
# DATABASE CONFIGURATION
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/banking_system
spring.datasource.username=bank_user
spring.datasource.password=sandeep712
spring.datasource.driver-class-name=org.postgresql.Driver


# ==========================================
# HIKARI CONNECTION POOL (Optional tuning)
# ==========================================
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=BankHikariPool

# ===========================================
# SERVER CONFIGURATION
# ===========================================
server.port=8080


# ===========================================
# Logging (To see SQL queries in console)
# ===========================================
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.bank=DEBUG

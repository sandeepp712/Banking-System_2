spring.application.name=banking-api

# ==========================================
# DATABASE CONFIGURATION
# ==========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:banking_system}
spring.datasource.username=${DB_USER:bank_user}
spring.datasource.password=${DB_PASSWORD:sandeep712}
spring.datasource.driver-class-name=org.postgresql.Driver


# ==========================================
# HIKARI CONNECTION POOL (Optional tuning)
# ==========================================
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=BankHikariPool

# ===========================================
# SERVER CONFIGURATION
# ===========================================
server.port=8080


# ===========================================
# Logging (To see SQL queries in console)
# ===========================================
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.bank=DEBUG


#Expose the health and info endpoints over the web
management.endpoints.web.exposure.include=health,info

#Show detailed health information (like database status)
management.endpoint.health.show-details=always



# Flyway
spring.flyway.enabled=true;
spring.flyway.locations=classpath:db/migration
# Baselining: treat existing database as version 1 and skip V1__init.sql
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

logging.level.org.flywaydb=DEBUG